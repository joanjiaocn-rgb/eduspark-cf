name = "eduspark-api"
main = "src/index.ts"
compatibility_date = "2024-02-08"

# 环境变量 (在 Cloudflare Dashboard 中设置)
[vars]
# OPENAI_API_KEY = "your-key-here"  # 在 Dashboard 中设置，不要硬编码

# KV 命名空间 (用于缓存和用户数据)
[[kv_namespaces]]
binding = "EDUSPARK_KV"
id = "your-kv-namespace-id"

# AI Gateway (可选，用于缓存 AI 响应)
[[ai]]
binding = "AI"

# 路由规则
[[routes]]
pattern = "api.eduspark.app/*"
custom_domain = true