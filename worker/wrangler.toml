name = "eduspark-api"
main = "src/index.ts"
compatibility_date = "2024-02-08"
account_id = "8e2346015c8dc8f669e08a23d1d365d6"

# 环境变量 (在 Cloudflare Dashboard 中设置)
[vars]
# OPENAI_API_KEY = "your-key-here"  # 在 Dashboard 中设置，不要硬编码

# KV 命名空间 (用于缓存和用户数据)
# 创建后填入 id: wrangler kv namespace create "EDUSPARK_KV"
# [[kv_namespaces]]
# binding = "EDUSPARK_KV"
# id = "your-kv-namespace-id"

# 路由规则
[[routes]]
pattern = "api.eduspark.workers.dev/*"
custom_domain = false